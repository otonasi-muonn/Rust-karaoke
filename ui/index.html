<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rust Karaoke</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
    <!-- カスタムタイトルバー（ボーダーレスウィンドウ） -->
    <header id="titlebar" data-tauri-drag-region>
    <div class="titlebar-left" data-tauri-drag-region>
      <span class="app-icon">🎤</span>
      <span class="app-title" data-tauri-drag-region>Rust カラオケ</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-settings" class="titlebar-btn" title="設定">⚙</button>
      <button id="btn-pip" class="titlebar-btn" title="PiPモード">⊞</button>
      <button id="btn-borderless" class="titlebar-btn" title="ボーダーレス切替">⬚</button>
      <button id="btn-minimize" class="titlebar-btn" title="最小化">─</button>
      <button id="btn-maximize" class="titlebar-btn" title="最大化">□</button>
      <button id="btn-close" class="titlebar-btn btn-close" title="閉じる">✕</button>
    </div>
  </header>

  <main id="app">
    <!-- URL入力セクション -->
    <section id="input-section">
      <h2 id="input-heading">🎵 歌いたい曲のURLを貼り付けてください</h2>
      <div class="url-input-group">
        <input type="text" id="youtube-url" placeholder="YouTube URLを入力..." autocomplete="off" />
        <button id="btn-analyze" class="btn-primary">解析開始</button>
      </div>
      <p id="input-hint">YouTubeの楽曲URLを入力すると、AIが自動で音源分離・ピッチ解析を行います</p>
      <div id="progress-bar-container" class="hidden">
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <span id="progress-text">待機中...</span>
      </div>
    </section>

    <!-- ローディングオーバーレイ -->
    <div id="loading-overlay" class="hidden">
      <div class="loading-content">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          <div class="spinner-ring spinner-ring-2"></div>
          <div class="spinner-icon">🎵</div>
        </div>
        <h3 id="loading-title">楽曲を解析中...</h3>
        <p id="loading-message">AIが音源分離・ピッチ解析を行っています</p>
        <div class="loading-progress">
          <div class="loading-progress-bar">
            <div id="loading-progress-fill"></div>
          </div>
          <div class="loading-steps">
            <div class="loading-step" id="step-download"><span class="step-icon">⬇</span> ダウンロード</div>
            <div class="loading-step" id="step-decode"><span class="step-icon">🔊</span> デコード</div>
            <div class="loading-step" id="step-separation"><span class="step-icon">🎤</span> ボーカル分離</div>
            <div class="loading-step" id="step-pitch"><span class="step-icon">📊</span> ピッチ解析</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Karaoke View -->
    <section id="karaoke-section" class="hidden">
      <!-- Pitch visualization canvas -->
      <div id="canvas-container">
        <canvas id="pitch-canvas"></canvas>
        <div id="pitch-info">
          <div id="current-note">---</div>
          <div id="pitch-hz">0 Hz</div>
        </div>
      </div>

      <!-- Score display -->
      <div id="score-panel">
        <div id="score-display">
          <div class="score-value" id="score-value">0.0</div>
          <div class="score-label">スコア</div>
        </div>
        <div id="judgement-display">
          <span id="judgement-text" class="judgement-miss">---</span>
        </div>
        <div id="score-breakdown">
          <div class="score-item perfect"><span class="count" id="perfect-count">0</span><span class="label">完璧</span></div>
          <div class="score-item great"><span class="count" id="great-count">0</span><span class="label">素晴らしい</span></div>
          <div class="score-item good"><span class="count" id="good-count">0</span><span class="label">良い</span></div>
          <div class="score-item miss"><span class="count" id="miss-count">0</span><span class="label">ミス</span></div>
        </div>
      </div>

      <!-- 操作ボタン -->
      <div id="controls">
        <button id="btn-start" class="btn-primary btn-large">▶ 歌い始める</button>
        <button id="btn-stop" class="btn-danger btn-large hidden">■ 終了する</button>
        <button id="btn-back" class="btn-secondary">← 曲選択に戻る</button>
      </div>
    </section>

    <!-- 設定パネル -->
    <div id="settings-panel" class="hidden">
      <div class="settings-content">
        <div class="settings-header">
          <h3>⚙ 設定</h3>
          <button id="btn-settings-close" class="titlebar-btn">✕</button>
        </div>

        <!-- マイク設定 -->
        <div class="settings-section">
          <h4>🎤 マイク設定</h4>
          <div class="settings-row">
            <label for="mic-select">入力デバイス</label>
            <div class="settings-row-controls">
              <select id="mic-select"><option value="">読み込み中...</option></select>
              <button id="btn-mic-refresh" class="btn-icon" title="デバイスを更新">🔄</button>
            </div>
          </div>
          <div class="settings-row">
            <label>マイク感度</label>
            <div class="slider-group">
              <input type="range" id="mic-gain" min="0" max="300" value="100" class="settings-slider" />
              <span id="mic-gain-value" class="slider-value">100%</span>
            </div>
          </div>
          <div class="settings-row">
            <label>マイクテスト</label>
            <div class="mic-test-group">
              <button id="btn-mic-test" class="btn-secondary btn-small">🎙 テスト</button>
              <div class="mic-level-bar">
                <div id="mic-level-fill" class="mic-level-fill"></div>
              </div>
              <span id="mic-test-status" class="test-status">未テスト</span>
            </div>
          </div>
        </div>

        <!-- 音量設定 -->
        <div class="settings-section">
          <h4>🔊 音量設定</h4>
          <div class="settings-row">
            <label>伴奏音量</label>
            <div class="slider-group">
              <input type="range" id="bgm-volume" min="0" max="200" value="100" class="settings-slider" />
              <span id="bgm-volume-value" class="slider-value">100%</span>
            </div>
          </div>
        </div>

        <!-- 表示設定 -->
        <div class="settings-section">
          <h4>🖥 表示設定</h4>
          <div class="settings-row">
            <label>UI拡大率</label>
            <div class="slider-group">
              <button id="btn-zoom-out" class="btn-icon" title="縮小">−</button>
              <input type="range" id="ui-zoom" min="50" max="200" value="100" step="10" class="settings-slider" />
              <button id="btn-zoom-in" class="btn-icon" title="拡大">＋</button>
              <span id="ui-zoom-value" class="slider-value">100%</span>
            </div>
          </div>
          <div class="settings-row">
            <label></label>
            <button id="btn-zoom-reset" class="btn-secondary btn-small">リセット (100%)</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
